<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Trip</title>
    <!-- Link to an external CSS file -->
    <link rel="stylesheet" href="add_trip.css">
    <script src="add_trip.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.js"></script>
</head>
<body>
    <!-- the sticky header at the top of the pages (can use the same for the other pages) -->
    <header class="pageHeader">
        <!--logo that'll take you to the home page-->  
        <a href="home.html" class="logo">
            <img src="logo.png" id="logo" alt="logo">
        </a>

        <!--the links that'll take you to the other pages-->
        <nav class="navLinks">
            <a href="home.html">Home</a>
            <a href="upcoming_trips.html">Upcoming Trips</a>
            <a href="past_trips.html">Past Trips</a>
            <a href="what_if.html">What if?</a>
        </nav>
    </header>

    <main>
        <h1>Add Trip</h1>
        <!--the form to add details of the trip-->
        <div class="split-layout">
            <form id="addTripForm">

                <!--div for the trip name-->
                <div class="form">
                    <label for="tripName">Trip Name <span class="required">*</span></label>
                    <input type="text" id="tripName" name="tripName" placeholder="e.g. Japan spring trip" required>
                </div>

                <!--div for the cities they're visting-->
                <div class="form">
                    <label for="cityVisting">Cities Visting <span class="required">*</span></label>
                    <input type="text" id="cityVisting" placeholder="Start typing a city...">

                    <ul id="citySuggestions" class="suggestions"></ul>
                    <div id="citiesSelected" class="selected"></div>
                </div>

                <!--div for the days they're traveling-->
                <div class="form">
                    <label for="tripDates">Trip Dates <span class="required">*</span></label>
                    <input type="date" id="startDate" required>
                    <input type="date" id="endDate" required>
                </div>

                <!--div for the budget range (ticketmaster's slider for reference)-->
                <div class="form-group">
                    <label for="budgetSlider">Budget Range <span class="required">*</span></label>

                    <!-- the actual slider-->
                    <div id="budgetSlider"></div>

                    <!-- value range for slider -->
                    <span id="budgetValue">$0 - $15,000</span>
                </div>

                <button type="submit">Create Trip</button>

            </form>

            <section class="itinerary-panel">
                <h2>Trip Itinerary</h2>

                <p><strong>Trip Name:</strong> <span id="previewTripName"></span></p>
                <p><strong>Cities:</strong> <span id="previewCities"></span></p>
                <p><strong>Dates:</strong> <span id="previewDates"></span></p>
                <p><strong>Budget:</strong> <span id="previewBudget"></span></p>
            </section>
        </div>
    </main>
    
</body>
</html>
