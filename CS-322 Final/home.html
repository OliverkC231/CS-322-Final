<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Trips</title>
    <!-- Link to an external CSS file -->
    <link rel="stylesheet" href="home.css">
    <script src="home.js" defer></script>
</head>
<body>
    <!-- the sticky header at the top of the pages (can use the same for the other pages) -->
    <header class="pageHeader">
        <!--logo that'll take you to the home page-->  
        <a href="home.html" class="logo">
            <img src="logo.png" id="logo" alt="logo">
        </a>

        <!--the links that'll take you to the other pages-->
        <nav class="navLinks">
            <a href="log_in.html">Log In</a>
            <a href="save_trip.html">Saved Trips</a>
            <a href="add_trip.html">Add Trips</a>
            <a href="what_if.html">What if?</a>
        </nav>
    </header>

    <main>
        <h1>Welcome to Tripli</h1>

        <section class="home-actions">
            <a href="add_trip.html" class="home-button">Add Trip</a>
            <a href="save_trip.html" class="home-button">Saved Trips</a>
            <a href="what_if.html" class="home-button">What If?</a>
        </section>

        <section class="trip-preview-section">
            <h2>Your Saved Trips</h2>

            <div class="home-preview-layout">
                <div class="home-preview-column">
                    <h3>Upcoming Trips</h3>
                    <div id="homeUpcomingTrips" class="home-trips-preview">
                        <!-- JavaScript will add upcoming trips here -->
                    </div>
                </div>

                <div class="home-preview-column">
                    <h3>Past Trips</h3>
                    <div id="homePastTrips" class="home-trips-preview">
                        <!-- JavaScript will add past trips here -->
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
